name: Azure OIDC Connection

on:
  push:
    branches: [ "main" ]

# 1. THE PERMISSIONS BLOCK (MANDATORY)
permissions:
  id-token: write   # This allows GitHub to request the OIDC token
  contents: read    # This allows the runner to read your code

jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. THE LOGIN STEP
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Show Azure Account
        run: az account show
